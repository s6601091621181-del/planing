<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance - Data Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;600;700&display=swap');
        
        /* พื้นหลังและฟอนต์แบบเก่า */
        body { background-color: #0f172a; font-family: 'Chakra Petch', sans-serif; color: #e2e8f0; }
        
        /* สไตล์ปุ่มย้อนกลับแบบเก่า */
        .btn-back { border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s; background-color: rgba(30, 41, 59, 0.8); }
        .btn-back:hover { background: rgba(255, 255, 255, 0.1); transform: translateX(-5px); }
        
        /* สไตล์กล่องฟอร์มแบบเรียบง่าย */
        .form-container { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 2rem; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5); }
        .input-label { display: block; margin-bottom: 0.5rem; color: #94a3b8; font-size: 1rem; }
        .input-box { width: 100%; background: #0f172a; border: 1px solid #475569; color: white; padding: 0.75rem 1rem; border-radius: 8px; outline: none; transition: border-color 0.2s; }
        .input-box:focus { border-color: #3b82f6; }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-3xl mx-auto">
        
        <div class="mb-8 flex items-center">
            <a href="index.html" class="btn-back px-5 py-2.5 rounded-xl flex items-center gap-2 text-slate-300 hover:text-white">
                <i class="fas fa-arrow-left"></i> ย้อนกลับ
            </a>
            <h1 class="text-xl md:text-2xl font-bold ml-6 text-blue-400">แบบฟอร์มบันทึกข้อมูล</h1>
        </div>

        <div class="form-container">
            <form class="space-y-6">
                
                <div class="max-w-xs">
                    <label class="input-label">วันที่ :</label>
                    <input type="date" class="input-box">
                </div>

                <div class="grid grid-cols-2 gap-4 max-w-md">
                    <div>
                        <label class="input-label">Type :</label>
                        <input type="text" placeholder="เช่น A1, B, C" class="input-box">
                    </div>
                    <div>
                        <label class="input-label">ครั้งที่ :</label>
                        <input type="text" placeholder="ระบุตัวเลข" class="input-box">
                    </div>
                </div>

                <div class="max-w-xs">
                    <label class="input-label">Start date :</label>
                    <input type="date" class="input-box">
                </div>

                <div class="max-w-xs">
                    <label class="input-label">Finish date :</label>
                    <input type="date" class="input-box">
                </div>

                <div class="max-w-xs">
                    <label class="input-label">เวลาที่ใช้ (วัน) :</label>
                    <input type="text" placeholder="ระบุจำนวนวัน" class="input-box">
                </div>

                <div>
                    <label class="input-label">Comment :</label>
                    <textarea rows="4" placeholder="พิมพ์รายละเอียดเพิ่มเติมที่นี่..." class="input-box resize-none"></textarea>
                </div>

                <hr class="border-slate-700 my-4">

                <div>
                    <button type="button" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-lg transition-colors flex items-center justify-center gap-2 border border-blue-400 w-full sm:w-auto">
                        <i class="fas fa-save"></i> บันทึกข้อมูล
                    </button>
                </div>

            </form>
        </div>
        
    </div>

</body>
</html>
